name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Python
        run: uv python install 3.11

      - name: Sync
        run: uv sync --extra dev --extra assertions

      - name: Ruff
        run: uv run ruff check src tests && uv run ruff format --check src tests

      - name: Pytest
        run: uv run pytest -q
